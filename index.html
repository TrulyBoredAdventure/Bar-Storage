<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bar Storage</title><style>

<body><header class="topbar"><div><h1>Bar Storage</h1><p>RS3 action bar references and saved personal presets.</p></div><div class="top-actions"><button id="newPresetBtn">New bar</button> <button id="exportBtn" class="secondary">Export</button> <label class="importLabel secondary">Import<input id="importInput" type="file" accept="application/json" hidden></label></div></header>

<dialog id="detailDialog"><article id="detailPanel" class="detail-dialog"></article></dialog>

(function(){

function $(id){return document.getElementById(id)}

function openDetail(b){

  $('detailDialog').showModal();
}
function openEditor(bar){bar=bar||{}; $('editorTitle').textContent=bar.id?'Edit bar':'New bar'; $('presetId').value=bar.id||''; $('presetName').value=bar.name||''; $('presetCategory').value=bar.category||'User'; $('presetStyle').value=bar.style||'Necromancy'; refreshEditorWeapons(bar.weapon); $('presetMode').value=bar.mode||'Revolution'; $('presetTarget').value=bar.target||''; $('presetTags').value=(bar.tags||[]).join(', '); $('presetAbilities').value=(bar.abilities||[]).slice(0,MAX_SLOTS).join('\\n'); $('presetRequirements').value=(bar.requirements||[]).join('\\n'); $('presetNotes').value=bar.notes||''; checkAbilityCount(); $('editorDialog').showModal()}
function formToBar(id){return norm({id:id||uid(),source:'user',name:$('presetName').value.trim(),category:$('presetCategory').value,style:$('presetStyle').value,mode:$('presetMode').value,weapon:$('presetWeapon').value,target:$('presetTarget').value.trim()||'Custom',tags:splitList($('presetTags').value),abilities:splitList($('presetAbilities').value),requirements:splitList($('presetRequirements').value),notes:$('presetNotes').value.trim()})}
function deleteBar(id){state.bars=state.bars.filter(function(b){return b.id!==id}); saveUserBars(); populateFilters(); renderList()}

function init(){try{var saved=safeJson(localStorage.getItem(STORAGE_KEY),[]); state.bars=(window.SEED_BARS||[]).map(norm).concat(saved.map(norm)); populateFilters(); renderList()}catch(e){$('barList').innerHTML='<p class="warning">Bar Storage failed to load: '+esc(e.message)+'</p>'; console.error(e)}}
