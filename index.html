<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bar Storage</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Bar Storage</h1>
      <p>RS3 action bar references and saved personal presets.</p>
    </div>
    <div class="top-actions">
      <button id="newPresetBtn">New preset</button>
      <button id="exportBtn" class="secondary">Export</button>
      <label class="importLabel secondary">Import<input id="importInput" type="file" accept="application/json" hidden></label>
    </div>
  </header>

  <main class="shell">
    <section class="filters card">
      <input id="searchInput" type="search" placeholder="Search boss, Slayer, style, ability..." autocomplete="off" />
      <select id="categoryFilter"><option value="all">All categories</option></select>
      <select id="styleFilter"><option value="all">All styles</option></select>
      <select id="modeFilter"><option value="all">All modes</option></select>
      <select id="weaponFilter"><option value="all">All weapons</option></select>
      <span id="resultCount" class="count">0 shown</span>
    </section>

    <section id="barList" class="bar-list"></section>
  </main>

  <dialog id="detailDialog">
    <article id="detailPanel" class="detail-dialog"></article>
  </dialog>

  <dialog id="editorDialog">
    <form id="editorForm" method="dialog">
      <h2 id="editorTitle">Preset</h2>
      <input type="hidden" id="presetId" />
      <div class="form-grid">
        <label>Name<input id="presetName" required /></label>
        <label>Category<select id="presetCategory"></select></label>
        <label>Combat style<select id="presetStyle"></select></label>
        <label>Mode<select id="presetMode"></select></label>
        <label>Weapon type<select id="presetWeapon"></select></label>
        <label>Target<input id="presetTarget" placeholder="Boss, Slayer monster, general" /></label>
      </div>
      <label>Tags<input id="presetTags" placeholder="comma separated: boss, beginner, poisonable" /></label>
      <label>Abilities<textarea id="presetAbilities" rows="5" placeholder="One ability per line or comma separated. Maximum 14 slots."></textarea></label>
      <p id="abilityWarning" class="warning hidden">Only the first 14 abilities will be saved.</p>
      <label>Unlock requirements<textarea id="presetRequirements" rows="3" placeholder="One per line"></textarea></label>
      <label>Notes<textarea id="presetNotes" rows="4"></textarea></label>
      <menu>
        <button value="cancel" class="secondary">Cancel</button>
        <button id="savePresetBtn" value="default">Save</button>
      </menu>
    </form>
  </dialog>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
