<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Bar Storage</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="icon.svg" alt="" width="38" height="38">
      <div>
        <h1>Bar Storage</h1>
        <p>RS3 action bar references and personal presets.</p>
      </div>
    </div>
    <div class="top-actions">
      <button id="newPresetBtn">New bar</button>
      <button id="exportBtn" class="secondary">Export</button>
      <label class="import-label secondary">Import<input id="importInput" type="file" accept="application/json" hidden></label>
    </div>
  </header>

  <main class="shell">
    <section class="filters card" aria-label="Bar filters">
      <input id="searchInput" type="search" placeholder="Search boss, Slayer monster, style, ability..." autocomplete="off">
      <select id="categoryFilter"><option value="all">All categories</option></select>
      <select id="styleFilter"><option value="all">All styles</option></select>
      <select id="modeFilter"><option value="all">All modes</option></select>
      <select id="weaponFilter"><option value="all">All weapons</option></select>
      <span id="resultCount" class="count">Loading…</span>
    </section>

    <section id="barList" class="bar-list" aria-live="polite">
      <p class="muted">Loading bars…</p>
    </section>
  </main>

  <dialog id="detailDialog" class="detail-dialog">
    <article id="detailPanel"></article>
  </dialog>

  <dialog id="editorDialog">
    <form id="editorForm">
      <div class="dialog-head">
        <h2 id="editorTitle">Bar</h2>
        <button type="button" id="cancelEdit" class="icon-button secondary" aria-label="Close">×</button>
      </div>
      <input type="hidden" id="presetId">
      <div class="form-grid">
        <label>Name<input id="presetName" required maxlength="80" placeholder="Necro Vorkath"></label>
        <label>Category<select id="presetCategory"></select></label>
        <label>Combat style<select id="presetStyle"></select></label>
        <label>Mode<select id="presetMode"></select></label>
        <label>Weapon type<select id="presetWeapon"></select></label>
        <label>Target<input id="presetTarget" maxlength="80" placeholder="Boss, Slayer monster, general"></label>
      </div>
      <label>Tags<input id="presetTags" maxlength="180" placeholder="boss, beginner, revo++"></label>
      <label>Abilities <span class="small">maximum 14; one per line or comma separated</span>
        <textarea id="presetAbilities" rows="7" placeholder="Touch of Death&#10;Soul Sap&#10;Death Skulls"></textarea>
      </label>
      <p id="abilityWarning" class="warning hidden">Only the first 14 abilities will be saved.</p>
      <label>Unlock requirements<textarea id="presetRequirements" rows="3" placeholder="One per line"></textarea></label>
      <label>Notes<textarea id="presetNotes" rows="4"></textarea></label>
      <menu>
        <button type="button" id="cancelEditBottom" class="secondary">Cancel</button>
        <button type="submit">Save</button>
      </menu>
    </form>
  </dialog>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
